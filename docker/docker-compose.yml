version: "3.9"

services:
  # ========== 监控链路 ==========
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Collector HTTP
      - "14250:14250"   # Collector gRPC
      - "6831:6831/udp" # Agent
    networks:
      - apps

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.73.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - D:/multimodal_microservice_extraction/data/processed/traces:/traces
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - apps

  # ========== AcmeAir ==========
  acmeair-db:
    container_name: acmeair-db
    image: mongo:5.0
    networks:
      - apps
    volumes:
      - acmeair_db_data:/data/db

  acmeair:
    image: acmeair-monolithic-java-acmeair-monolithic-java:latest
    container_name: acmeair
    user: root
    environment:
      - MONGO_HOST=acmeair-db
      - JAVA_TOOL_OPTIONS=-javaagent:/opt/otel-javaagent.jar -Dotel.exporter.otlp.endpoint=http://otel-collector:4317 -Dotel.service.name=acmeair
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
      - D:/multimodal_microservice_extraction/data/processed/logs/acmeair:/opt/acmeair/logs
      - D:/multimodal_microservice_extraction/data/processed/traces/acmeair:/opt/acmeair/traces
    ports:
      - "8081:9080"
    depends_on:
      - acmeair-db
      - otel-collector
    networks:
      - apps
    mem_limit: 1024m

  # ========== Daytrader ==========
  # ...existing code...
  daytrader7:
    image: daytrader7:latest
    container_name: daytrader7
    user: root
    environment:
      - JAVA_TOOL_OPTIONS=-javaagent:/opt/otel-javaagent.jar -Dotel.exporter.otlp.endpoint=http://otel-collector:4318 -Dotel.service.name=daytrader7
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
      - D:/multimodal_microservice_extraction/data/processed/logs/daytrader7:/opt/daytrader/logs
      - D:/multimodal_microservice_extraction/data/processed/traces/daytrader7:/opt/daytrader/traces
    ports:
      - "8082:9082"  # 修改：从 9080 改为 9082
    networks:
      - apps
    depends_on:
      - otel-collector
  # ...existing code...

  # ========== JPetStore ==========
  jpetstore:
    image: jpetstore:latest
    container_name: jpetstore
    user: root
    environment:
      - JAVA_TOOL_OPTIONS=-javaagent:/opt/otel-javaagent.jar -Dotel.exporter.otlp.endpoint=http://otel-collector:4317 -Dotel.service.name=jpetstore
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
      - D:/multimodal_microservice_extraction/data/processed/logs/jpetstore:/opt/jpetstore/logs
      - D:/multimodal_microservice_extraction/data/processed/traces/jpetstore:/opt/jpetstore/traces
    ports:
      - "8083:8080"
    networks:
      - apps
    depends_on:
      - otel-collector

  # ========== PlantsByWebSphere ==========
  plantsbywebsphere:
    image: plantsbywebsphere:latest  # 改为 latest，不是 liberty
    container_name: plantsbywebsphere
    environment:
      - JAVA_TOOL_OPTIONS=-javaagent:/opt/otel-javaagent.jar -Dotel.exporter.otlp.endpoint=otel-collector:4317 -Dotel.exporter.otlp.protocol=grpc -Dotel.service.name=plantsbywebsphere
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
      - D:/multimodal_microservice_extraction/data/processed/logs/plantsbywebsphere:/opt/ol/wlp/usr/servers/defaultServer/logs
      - D:/multimodal_microservice_extraction/data/processed/traces/plantsbywebsphere:/opt/ol/wlp/usr/servers/defaultServer/traces
    ports:
      - "8084:9080"
    networks:
      - apps
    depends_on:
      - otel-collector

# ========== 公用资源 ==========
volumes:
  acmeair_db_data:

networks:
  apps:
    driver: bridge
